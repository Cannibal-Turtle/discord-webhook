name: Healthcheck

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run healthcheck
        run: python tools/healthcheck.py
