name: Check RSS & Send Chapters

concurrency:
  group: rss-to-discord-state-rss
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [trigger-discord-notify]
  workflow_dispatch:
    inputs:
      feed:
        description: "Which chapter workflow should run?"
        type: choice
        required: true
        default: both
        options:
          - both
          - free
          - paid

permissions:
  contents: write

env:
  RSS_FEED_REPO: ${{ github.event.client_payload.rss_repo }}
  RSS_FEED_REF: ${{ github.event.client_payload.rss_ref }}

jobs:
  chapters:
    name: chapters
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements/chapters.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/chapters.txt

      - name: Decide feed
        id: feed
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "feed=${{ github.event.client_payload.feed }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "feed=${{ inputs.feed }}" >> "$GITHUB_OUTPUT"
          else
            echo "feed=both" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Free Chapters Bot
        if: ${{ steps.feed.outputs.feed == 'free' || steps.feed.outputs.feed == 'both' }}
        timeout-minutes: 5
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
          GIT_STATE_AUTO_COMMIT: "0"
        run: python bot_free_chapters.py

      - name: Run Paid Chapters Bot
        if: ${{ steps.feed.outputs.feed == 'paid' || steps.feed.outputs.feed == 'both' }}
        timeout-minutes: 5
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GIT_STATE_AUTO_COMMIT: "0"
        run: python bot_paid_chapters.py

      - name: Commit state
        if: ${{ always() }}
        shell: bash
        env:
          GIT_STATE_PUSH_RETRIES: "5"
          GIT_STATE_PUSH_RETRY_DELAY: "3"
        run: |
          .github/scripts/commit_paths_with_retry.sh "ci: update state_rss.json" state_rss.json
