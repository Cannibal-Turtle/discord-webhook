name: Check RSS & Send Chapters

concurrency:
  group: rss-to-discord-chapters
  cancel-in-progress: false

on:
  repository_dispatch:
    types: [trigger-discord-notify]
  workflow_dispatch:
    inputs:
      feed:
        description: "Which chapter workflow should run?"
        type: choice
        required: true
        default: both
        options:
          - both
          - free
          - paid

permissions:
  contents: write

jobs:
  chapters:
    name: chapters
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements/chapters.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/chapters.txt

      - name: Decide feed
        id: feed
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "feed=${{ github.event.client_payload.feed }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "feed=${{ inputs.feed }}" >> "$GITHUB_OUTPUT"
          else
            echo "feed=both" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Free Chapters Bot
        if: ${{ steps.feed.outputs.feed == 'free' || steps.feed.outputs.feed == 'both' }}
        timeout-minutes: 5
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
        run: python bot_free_chapters.py

      - name: Run Paid Chapters Bot
        if: ${{ steps.feed.outputs.feed == 'paid' || steps.feed.outputs.feed == 'both' }}
        timeout-minutes: 5
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python bot_paid_chapters.py

      - name: Commit state
        if: ${{ always() }}
        shell: bash
        run: |
          git pull --rebase --autostash
          git add state_rss.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "ci: update state_rss.json"
          git push