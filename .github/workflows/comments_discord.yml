name: Check RSS & Send Comments

on:
  repository_dispatch:
    types: [trigger-discord-comments]
  workflow_dispatch:

concurrency:
  group: rss-to-discord-state-rss
  cancel-in-progress: false

permissions:
  contents: write

env:
  RSS_FEED_REPO: ${{ github.event.client_payload.rss_repo }}
  RSS_FEED_REF: ${{ github.event.client_payload.rss_ref }}

jobs:
  comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements/comments.txt

      - name: Install deps
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/comments.txt
          
      - name: Run Comments Bot
        timeout-minutes: 5
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          PYTHONUNBUFFERED: 1
          GIT_STATE_AUTO_COMMIT: "0"
        run: python -u bot_comments.py

      - name: Commit updated state file
        if: ${{ always() }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_STATE_PUSH_RETRIES: "5"
          GIT_STATE_PUSH_RETRY_DELAY: "3"
        run: |
          bash .github/scripts/commit_paths_with_retry.sh "ci: update state_rss.json" state_rss.json
